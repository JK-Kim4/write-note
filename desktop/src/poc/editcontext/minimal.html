<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>EditContext 최소 예제 — 한글 결정 검증 (순수 HTML, React 없음)</title>
<style>
  body { font-family: system-ui, "Apple SD Gothic Neo", sans-serif; margin: 0; padding: 20px; background: #b6a890; }
  #dbg { font-family: ui-monospace, monospace; font-size: 13px; background: #1e1e1e; color: #b6f3b6; padding: 10px 12px; border-radius: 8px; white-space: pre-wrap; margin-bottom: 14px; }
  #editor {
    position: relative; max-width: 700px; min-height: 360px; background: #fbf8f1;
    border-radius: 12px; box-shadow: 0 14px 30px -18px rgba(40,30,20,.5); padding: 28px; outline: none; cursor: text;
  }
  #editor:focus { box-shadow: 0 0 0 2px #2b6cb0, 0 14px 30px -18px rgba(40,30,20,.5); }
  #content { font-family: "Gowun Batang", "Apple SD Gothic Neo", serif; font-size: 20px; line-height: 1.9; color: #232020; white-space: pre-wrap; word-break: break-word; min-height: 1.9em; }
  #caret { position: absolute; width: 2px; height: 1.4em; background: #2b6cb0; animation: blink 1s step-end infinite; pointer-events: none; }
  @keyframes blink { 50% { opacity: 0; } }
  .hint { max-width: 700px; font-size: 13px; color: #4a4236; margin: 12px 2px 0; line-height: 1.6; }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="dbg">EditContext 미지원이면 여기에 표시됩니다…</div>
  <div id="editor" tabindex="0" spellcheck="false">
    <div id="content"></div>
    <span id="caret"></span>
  </div>
  <p class="hint">
    여기에 <b>한글을 직접 타이핑</b>하세요. 위 검은 박스의 <b>ec.text</b> 값이 핵심 —
    "안녕"이면 EditContext가 음절로 정상 합침(GREEN), "ㅇㅏㄴ"이면 EditContext가 자모로 분해(RED).
    커서가 <b>하나만</b> 보이는지도 확인.
  </p>

<script>
  const editor = document.getElementById('editor');
  const content = document.getElementById('content');
  const caret = document.getElementById('caret');
  const dbg = document.getElementById('dbg');

  if (typeof EditContext === 'undefined') {
    dbg.textContent = '이 브라우저는 EditContext 미지원 — Chrome/Edge 121+ 필요';
  } else {
    const ec = new EditContext({ text: '' });
    editor.editContext = ec;

    function caretRange() {
      const r = document.createRange();
      const tn = content.firstChild;
      if (tn && tn.nodeType === 3) {
        const off = Math.min(ec.selectionStart, tn.length);
        r.setStart(tn, off); r.collapse(true);
      } else {
        r.selectNodeContents(content); r.collapse(true);
      }
      return r;
    }

    // 좌표 측정(getBoundingClientRect = 강제 reflow)은 다음 프레임으로 미룬다.
    // 동기로 측정하면 빠른 타자 때 IME 조합 처리를 막아 자모가 분해된다.
    let raf = 0;
    function scheduleMeasure() {
      if (raf) return;
      raf = requestAnimationFrame(() => {
        raf = 0;
        const rect = caretRange().getBoundingClientRect();
        const base = editor.getBoundingClientRect();
        caret.style.left = (rect.left - base.left) + 'px';
        caret.style.top = (rect.top - base.top) + 'px';
        ec.updateControlBounds(base);
        ec.updateSelectionBounds(rect);
      });
    }

    function render(ev) {
      content.textContent = ec.text;   // 표시(가벼움, 강제 reflow 없음)
      dbg.textContent =
        'ec.text = ' + JSON.stringify(ec.text) +
        '\nselectionStart = ' + ec.selectionStart +
        '\n마지막 이벤트 = ' + ev;
      scheduleMeasure();               // 측정은 다음 프레임에
    }

    ec.addEventListener('textupdate', () => render('textupdate'));
    ec.addEventListener('compositionstart', () => render('compositionstart'));
    ec.addEventListener('compositionend', () => render('compositionend'));

    editor.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const s = ec.selectionStart;
        ec.updateText(s, s, '\n');
        ec.updateSelection(s + 1, s + 1);
        render('enter');
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        const p = Math.max(0, ec.selectionStart - 1);
        ec.updateSelection(p, p); render('arrow');
      } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        const p = Math.min(ec.text.length, ec.selectionStart + 1);
        ec.updateSelection(p, p); render('arrow');
      }
    });

    editor.addEventListener('focus', () => render('focus'));
    editor.focus();
    render('init');
  }
</script>
</body>
</html>
