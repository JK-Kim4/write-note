appId: com.naraenote.desktop
productName: Narae Note
directories:
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
# node:sqlite 는 Node 내장 → 네이티브 모듈 패키징(asarUnpack/rebuild) 불필요.
asar: true
mac:
  # Intel + Apple Silicon 모두 실행 (공개 배포) — arch 는 target 객체로 지정.
  target:
    - target: dmg
      arch: universal
  icon: assets/icon.png
  # 무서명 배포 — ad-hoc 서명(null 은 서명 생략 → arm64 실행 거부 위험).
  identity: "-"
  # 무서명 + Hardened Runtime 조합은 실행 차단될 수 있어 끈다.
  hardenedRuntime: false
  # 버전 미포함 고정 파일명 → releases/latest/download 링크 불변 (하이픈, 공백 회피).
  artifactName: Narae-Note.${ext}
win:
  target: nsis
  icon: assets/icon.png
  artifactName: Narae-Note-Setup.${ext}
nsis:
  # 마법사 없는 1-click + 사용자 단위 설치(관리자 권한 불필요).
  oneClick: true
  perMachine: false
# 게시 대상 명시 (package.json 에 repository 필드 없음).
# releaseType 기본값 draft → 양 OS 자산 업로드 후 사람이 검증·게시(quickstart T005).
publish:
  provider: github
  owner: JK-Kim4
  repo: write-note
