appId: com.naraenote.desktop
productName: Narae Note
directories:
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
# node:sqlite 는 Node 내장 → 네이티브 모듈 패키징(asarUnpack/rebuild) 불필요.
asar: true
mac:
  target: dmg
  icon: assets/icon.png
  # 테스트용 — 코드 서명 없음(Gatekeeper 우클릭-열기로 실행).
  identity: null
