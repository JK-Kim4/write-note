services:
  postgres:
    image: postgres:17-alpine
    container_name: write-note-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: writenote
      POSTGRES_USER: writenote
      POSTGRES_PASSWORD: writenote-local-dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U writenote -d writenote"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
