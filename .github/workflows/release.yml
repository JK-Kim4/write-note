name: Release Desktop

# 데스크톱 앱 개발 일시 중단(2026-06-22) — v* 태그 자동 빌드 비활성화.
# 웹앱 릴리즈가 v* 태그를 쓰므로 데스크톱 빌드가 의도치 않게 트리거되지 않도록 수동 실행만 남김.
# 데스크톱 개발 재개 시 아래 push.tags 트리거를 복원할 것:
#   on:
#     push:
#       tags:
#         - 'v*'
# electron-builder 는 macOS 에서 Windows 설치파일을 못 만들어(크로스빌드 불가) OS 별 러너 필요.
on:
  workflow_dispatch:

permissions:
  contents: write # Release 생성 · 자산 업로드

jobs:
  build:
    strategy:
      # 한 OS 빌드 실패가 다른 OS 빌드를 죽이지 않음.
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: --mac
          - os: windows-latest
            target: --win
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: desktop/.nvmrc
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      # .npmrc(node-linker=hoisted) + package.json(onlyBuiltDependencies:[electron]) 적용.
      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build (tsc + vite)
        run: pnpm build

      # electron-builder 가 host OS 용 설치파일 빌드 후 draft Release 에 업로드.
      # macOS: universal dmg + ad-hoc 서명 / Windows: 1-click NSIS.
      - name: Package & publish
        run: pnpm exec electron-builder ${{ matrix.target }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
