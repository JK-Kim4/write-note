spring:
  application:
    name: write-note-backend
  profiles:
    default: local
  datasource:
    hikari:
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID:placeholder-set-real-via-env-in-prod}
            client-secret: ${KAKAO_CLIENT_SECRET:placeholder-set-real-via-env-in-prod}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8080/api/auth/oauth/kakao/callback}
            scope:
              - profile_nickname
              - account_email
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:25}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.writenote: INFO
    org.springframework.security: INFO

app:
  cors:
    allowed-origins: http://localhost:3000
  cookie:
    secure: false
  auth:
    jwt:
      secret: ${JWT_SECRET:}
      access-token-validity-seconds: 3600
      refresh-token-validity-seconds: 2592000
  mail:
    mode: smtp
    from: ${MAIL_FROM:no-reply@write-note.local}
    base-url: ${MAIL_BASE_URL:http://localhost:8080}
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
  work-session:
    # 자동 종료 시 이 시간(초) 미만 세션은 폐기 (짧은 진입 노이즈 제거 — 2026-06-13 30→15 완화)
    min-session-seconds: ${WORK_SESSION_MIN_SECONDS:15}
    # 이 시간(시간) 초과해 열려 있는 dangling 세션을 스케줄러가 폐기
    max-open-hours: ${WORK_SESSION_MAX_OPEN_HOURS:12}
    # dangling 정리 스케줄 (기본 매시간 정각)
    cleanup-cron: ${WORK_SESSION_CLEANUP_CRON:0 0 * * * *}
