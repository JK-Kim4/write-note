spring:
  application:
    name: write-note-backend
  profiles:
    default: local
  datasource:
    hikari:
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.writenote: INFO
    org.springframework.security: INFO

app:
  cors:
    allowed-origins: http://localhost:3000
