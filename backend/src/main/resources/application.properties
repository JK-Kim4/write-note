spring.application.name=backend

# Datasource — local docker postgres (docker-compose.yml)
spring.datasource.url=jdbc:postgresql://localhost:5432/writenote
spring.datasource.username=writenote
spring.datasource.password=writenote-local-dev

# JPA — Flyway 가 schema 관리, JPA 는 validate
spring.jpa.hibernate.ddl-auto=validate

# Flyway
spring.flyway.enabled=true
